name: Update Morning Brief

on:
  workflow_dispatch:
  schedule:
    # 8:00 AM IST = 2:30 AM UTC
    - cron: "30 2 * * 1-5"

permissions:
  contents: write

jobs:
  update-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate morning brief data
        run: npm run generate:brief

      - name: Commit updated brief
        run: |
          git config user.name "marketpulse-bot"
          git config user.email "marketpulse-bot@users.noreply.github.com"
          git add data/currentMorningBriefData.json
          git diff --cached --quiet || git commit -m "Update morning brief data"
          git push
