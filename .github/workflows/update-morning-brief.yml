name: Update Morning Brief

on:
  workflow_dispatch:
  schedule:
    # 5:00 AM IST, Monday-Friday. GitHub Actions schedules use UTC, so this runs Sunday-Thursday at 11:30 PM UTC.
    - cron: "30 23 * * 0-4"

permissions:
  contents: write

jobs:
  update-morning-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate morning brief data
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1' }}
          OPENAI_PAYLOAD_FILE: data/morning_market_payload_v2.json
          OPENAI_MAX_OUTPUT_TOKENS: "12000"
          OPENAI_SEARCH_CONTEXT_SIZE: medium
          OPENAI_MAX_ATTEMPTS: "3"
          OPENAI_RETRY_DELAY_MS: "20000"
        run: npm run generate:brief

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/currentMorningBriefData.json
          git diff --cached --quiet || git commit -m "Update morning brief data"
          git push
